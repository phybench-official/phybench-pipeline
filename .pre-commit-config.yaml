repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [types-tabulate]
        args: [--ignore-missing-imports, --no-strict-optional, --allow-untyped-calls, --allow-untyped-defs, --allow-any-generics, --no-warn-no-return, --disable-error-code=annotation-unchecked]
