[mypy]
python_version = 3.13
# Very permissive mypy setup for existing codebase
ignore_missing_imports = True
allow_untyped_calls = True
allow_untyped_defs = True
allow_incomplete_defs = True
allow_untyped_decorators = True
allow_any_generics = True
no_implicit_optional = False
# Disable all warnings except critical errors
warn_return_any = False
warn_unused_configs = False
warn_no_return = False
warn_unreachable = False
strict_equality = False
show_error_codes = True
# Very permissive settings
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
disallow_untyped_decorators = False
disallow_any_generics = False
# Disable annotation requirements
disable_error_code = annotation-unchecked,var-annotated

# Ignore all errors in third-party modules
[mypy-latex2sympy2_extended.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-sympy.*]
ignore_missing_imports = True
ignore_errors = True
