[mypy]
python_version = 3.13

ignore_missing_imports = True
allow_untyped_calls = False
allow_untyped_defs = False
allow_incomplete_defs = False
allow_untyped_decorators = False
allow_any_generics = False
no_implicit_optional = True
disallow_untyped_decorators = True

# Enable more warnings
warn_return_any = True
warn_unused_configs = True
warn_no_return = True
warn_unreachable = True
warn_redundant_casts = True
warn_unused_ignores = True
strict_equality = True
show_error_codes = True

# Enable stricter type checking
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_any_generics = True
# These are too strict for this codebase with third-party libraries
disallow_any_unimported = False
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = False
disallow_subclassing_any = False

# Stricter optional handling
no_implicit_reexport = True
strict_optional = True

# Additional quality settings
warn_incomplete_stub = True

# Enable more detailed function signature analysis
extra_checks = True

# Remove disabled error codes - enable more strict checking

# Ignore all errors in third-party modules
[mypy-latex2sympy2_extended.*]
ignore_missing_imports = True
ignore_errors = True

[mypy-sympy.*]
ignore_missing_imports = True
ignore_errors = True
